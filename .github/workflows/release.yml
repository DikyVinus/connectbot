name: Hardened Release Pipeline

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build, test, and sign
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout (pinned)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@0723195856401067f7a2779048b490ace7a47d7c

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Gradle (dependency graph + cache)
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c
        with:
          dependency-graph: generate-and-submit

      - name: Setup Android SDK (pinned)
        uses: android-actions/setup-android@v3.2.2
        with:
          packages: |
            platform-tools
            platforms;android-34
            build-tools;34.0.0

      - name: Enable KVM + free disk
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger

          sudo rm -rf \
            /opt/ghc \
            /opt/google/chrome \
            /opt/hostedtoolcache/CodeQL \
            /usr/lib/mono \
            /usr/local/share/boost \
            /usr/share/dotnet || true

          sudo apt-get clean
          sudo swapoff -a || true
          sudo rm -f /swapfile || true

      - name: Set reproducible timestamp
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> $GITHUB_ENV

      - name: Verify Gradle dependencies
        run: ./gradlew --verify-dependencies

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          chmod 600 keystore.jks

      - name: Build + unit tests
        run: |
          ./gradlew build \
            --no-daemon \
            --stacktrace \
            --parallel

      - name: Run instrumentation tests
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a
        with:
          api-level: 29
          arch: x86_64
          script: ./gradlew connectedCheck --continue

      - name: Build signed release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease bundleRelease \
            --no-daemon \
            --stacktrace \
            -Pandroid.injected.signing.store.file=$PWD/keystore.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Verify signed APK
        run: |
          jarsigner -verify -verbose -certs app/build/outputs/apk/oss/release/app-oss-release.apk

      - name: Assert outputs exist
        run: |
          test -f app/build/outputs/apk/oss/release/app-oss-release.apk
          test -f app/build/outputs/apk/google/release/app-google-release.apk
          test -f app/build/outputs/bundle/ossRelease/app-oss-release.aab
          test -f app/build/outputs/bundle/googleRelease/app-google-release.aab

      - name: Prepare artifacts
        run: |
          TAG="manual-$(git rev-parse --short HEAD)"
          TITLE="Release $TAG"

          echo "$TAG" > tag.txt
          echo "$TITLE" > release-title.txt

          cp app/build/outputs/apk/oss/release/app-oss-release.apk ConnectBot-${TAG}-oss.apk
          cp app/build/outputs/apk/google/release/app-google-release.apk ConnectBot-${TAG}-google.apk
          cp app/build/outputs/bundle/ossRelease/app-oss-release.aab ConnectBot-${TAG}-oss.aab
          cp app/build/outputs/bundle/googleRelease/app-google-release.aab ConnectBot-${TAG}-google.aab
          cp app/build/outputs/native-debug-symbols/ossRelease/native-debug-symbols.zip ConnectBot-${TAG}-oss.native-debug-symbols.zip || true
          cp app/build/outputs/native-debug-symbols/googleRelease/native-debug-symbols.zip ConnectBot-${TAG}-google.native-debug-symbols.zip || true
          cp app/build/outputs/mapping/ossRelease/mapping.txt ConnectBot-${TAG}-oss.mapping.txt || true
          cp app/build/outputs/mapping/googleRelease/mapping.txt ConnectBot-${TAG}-google.mapping.txt || true

          zstd *.mapping.txt || true

      - name: Generate checksums
        run: sha256sum *.{apk,aab,zip,zst} > checksums.txt || true

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: release
          path: |
            *.apk
            *.aab
            *.zip
            *.zst
            checksums.txt
            tag.txt
            release-title.txt

      - name: Cleanup keystore
        if: always()
        run: rm -f keystore.jks

  release:
    name: Publish release
    needs: build
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release

      - name: Read metadata
        id: meta
        run: |
          echo "TAG=$(cat tag.txt)" >> $GITHUB_OUTPUT
          echo "TITLE=$(cat release-title.txt)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          tag_name: ${{ steps.meta.outputs.TAG }}
          name: ${{ steps.meta.outputs.TITLE }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            *.apk
            *.aab
            *.zip
            *.zst
            checksums.txt
