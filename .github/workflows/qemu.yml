name: Build QEMU aarch64 (Static Musl)
on: 
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU Emulation
        uses: docker/setup-qemu-action@v3

      - name: Build Statically in Alpine ARM64 Container
        run: |
          docker run --rm -v ${{ github.workspace }}:/work -w /work arm64v8/alpine:latest sh -c "
            apk update
            apk add build-base ninja python3 pkgconf glib-static glib-dev pixman-dev pixman-static zlib-dev zlib-static linux-headers bash rust cargo wget tar xz
            
            wget -q https://download.qemu.org/qemu-11.0.0-rc0.tar.xz
            tar -xf qemu-11.0.0-rc0.tar.xz
            cd qemu-11.0.0-rc0
            
            mkdir -p build && cd build
            
            ../configure \
              --target-list=aarch64-linux-user,aarch64-softmmu \
              --static \
              --disable-werror \
              --disable-guest-agent \
              --disable-docs \
              --disable-tools
              
            make -j\$(nproc)
          "

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qemu-aarch64-static-binaries
          path: |
            qemu-11.0.0-rc0/build/qemu-system-aarch64
            qemu-11.0.0-rc0/build/qemu-aarch64
          retention-days: 5
