name: Build QEMU aarch64
on: 
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Multiarch for Cross-Compilation
        run: |
          sudo sed -i 's/Types: deb/Types: deb\nArchitectures: amd64/g' /etc/apt/sources.list.d/ubuntu.sources
          cat <<EOF | sudo tee /etc/apt/sources.list.d/ubuntu-ports.sources
          Types: deb
          Architectures: arm64
          URIs: http://ports.ubuntu.com/ubuntu-ports
          Suites: noble noble-updates noble-security noble-backports
          Components: main restricted universe multiverse
          EOF
          sudo dpkg --add-architecture arm64
          sudo apt-get update

      - name: Install Cross-Compile Dependencies
        run: |
          sudo apt-get install -y \
            crossbuild-essential-arm64 \
            ninja-build \
            python3-venv \
            pkg-config \
            libglib2.0-dev:arm64 \
            libpixman-1-dev:arm64 \
            zlib1g-dev:arm64

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Download QEMU Source
        run: |
          wget -q https://download.qemu.org/qemu-11.0.0-rc0.tar.xz
          tar -xf qemu-11.0.0-rc0.tar.xz

      - name: Configure and Build
        run: |
          cd qemu-11.0.0-rc0
          mkdir -p build && cd build
          
          export PKG_CONFIG="aarch64-linux-gnu-pkg-config"
          
          ../configure \
            --cross-prefix=aarch64-linux-gnu- \
            --target-list=aarch64-linux-user,aarch64-softmmu \
            --static \
            --disable-werror
            
          make -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qemu-aarch64-binaries
          path: |
            qemu-11.0.0-rc0/build/qemu-system-aarch64
            qemu-11.0.0-rc0/build/qemu-aarch64
          retention-days: 5
